function polarToCart(cx,cy,r,deg){const rad=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}

function LineChart({data,color,title}){
  if(!data.length||data.every(d=>d.value===0))return <p style={{fontSize:14,color:A.g4,padding:"12px 0"}}>No data yet.</p>;
  const W=440,H=140,PX=68,PY=18;
  const vals=data.map(d=>d.value);const max=Math.max(...vals,1);const min=Math.min(0,...vals);const range=max-min||1;
  const toX=i=>PX+(i/Math.max(data.length-1,1))*(W-PX-PY);
  const toY=v=>H-PY-((v-min)/range)*(H-PY*2);
  const pts=data.map((d,i)=>({x:toX(i),y:toY(d.value),...d}));
  const line=pts.map((p,i)=>(i===0?"M":"L")+p.x+" "+p.y).join(" ");
  const area=line+" L"+pts[pts.length-1].x+" "+toY(min)+" L"+pts[0].x+" "+toY(min)+"Z";
  const gid="g"+color.replace("#","");
  return(
    <div>
      {title&&<p style={{fontWeight:600,fontSize:14,marginBottom:14}}>{title}</p>}
      <div style={{overflowX:"auto"}}>
        <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{minWidth:240}}>
          <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".15"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
          {[0,.5,1].map((t,i)=>{const v=min+t*range;const y=toY(v);return(<g key={i}><line x1={PX} y1={y} x2={W-PY} y2={y} stroke={A.g2} strokeWidth={1}/><text x={PX-5} y={y+4} fontSize={9} textAnchor="end" fill={A.g3}>{fmt(v)}</text></g>);})}
          <path d={area} fill={"url(#"+gid+")"}/>
          <path d={line} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
          {pts.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r={4} fill={color} stroke="#fff" strokeWidth={2}/><text x={p.x} y={H-2} fontSize={9} textAnchor="middle" fill={A.g3}>{p.label}</text></g>))}
        </svg>
      </div>
    </div>
  );
}

          style={{width:"100%",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",borderRadius:14,padding:"15px 18px",fontSize:16,color:"#fff",fontFamily:"inherit",outline:"none",letterSpacing:4,textAlign:"center",marginBottom:12,minHeight:52,WebkitAppearance:"none"}}/>
        {err&&<div style={{background:"rgba(255,55,95,.12)",border:"1px solid rgba(255,55,95,.2)",borderRadius:10,padding:"11px 14px",marginBottom:12,textAlign:"center"}}><p style={{color:"#ff375f",fontSize:14,fontWeight:500}}>{err}</p></div>}
        <button onClick={tryLogin} style={{width:"100%",background:"#fff",color:"#000",border:"none",borderRadius:"980px",padding:"15px",fontSize:16,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:20,minHeight:52}}>Sign In</button>
      </div>
    </div>
  );
}

function MainApp({role,onLogout,ownerPass,setOwnerPass,staffAccounts,setStaffAccounts}){
  const isOwner=role==="owner";
  const TABS=isOwner
    ?[["today","Today"],["schedule","Schedule"],["weekly","Weekly"],["clients","Clients"],["services","Services"],["staff","Staff"],["dashboard","Dashboard"],["permissions","Permissions"]]
    :[["today","Today"],["schedule","Schedule"]];

  const[svForm,setSvForm]=useState({name:"",price:""});const[editSvId,setEditSvId]=useState(null);const[showSvForm,setShowSvForm]=useState(false);
  const[nFilter,setNFilter]=useState("");

  const[trkEnd,setTrkEnd]=useState(tod());

  const calRef=useRef(null);

  useEffect(()=>{
    if(!DOC){setSync("Offline");return;}

      const d=snap.exists?snap.data():{};
      lastR.current=d;

      if(d.schedules)setSchedules(d.schedules);

      setPaymentStatus(d.paymentStatus||{});

    },()=>setSync("Offline"));
  },[]);

  const sf=(f,v,r)=>{if(!DOC||JSON.stringify(v)===JSON.stringify(r))return;DOC.set({[f]:v},{merge:true}).then(()=>setSync("Synced")).catch(()=>setSync("Error"));};
  useEffect(()=>{const t=setTimeout(()=>sf("clients",clients,lastR.current&&lastR.current.clients),800);return()=>clearTimeout(t);},[clients]);
  useEffect(()=>{const t=setTimeout(()=>sf("schedules",schedules,lastR.current&&lastR.current.schedules),800);return()=>clearTimeout(t);},[schedules]);
  useEffect(()=>{const t=setTimeout(()=>sf("expenses",expenses,lastR.current&&lastR.current.expenses),800);return()=>clearTimeout(t);},[expenses]);
  useEffect(()=>{const t=setTimeout(()=>sf("services",services,lastR.current&&lastR.current.services),800);return()=>clearTimeout(t);},[services]);
  useEffect(()=>{const t=setTimeout(()=>sf("staffByDate",staffByDate,lastR.current&&lastR.current.staffByDate),800);return()=>clearTimeout(t);},[staffByDate]);
  useEffect(()=>{const t=setTimeout(()=>sf("staffMembers",staffMembers,lastR.current&&lastR.current.staffMembers),800);return()=>clearTimeout(t);},[staffMembers]);
  useEffect(()=>{const t=setTimeout(()=>sf("paymentStatus",paymentStatus,lastR.current&&lastR.current.paymentStatus),800);return()=>clearTimeout(t);},[paymentStatus]);

  useEffect(()=>{
    if((tab==="schedule"||tab==="today")&&calView==="day"&&calRef.current){
      const h=now.getHours();
      if(h>=CAL_START&&h<CAL_END){setTimeout(()=>calRef.current&&calRef.current.scrollTo({top:Math.max(0,(h-CAL_START)*SLOT_H-80),behavior:"smooth"}),150);}
    }
  },[tab,calView,selDate]);

  const todStr=tod();
  const wk=getWeek(weekOff);

  const gSt=d=>(staffByDate[d]||[]).map(normSt);
  const gSal=d=>{const onDuty=gSt(d);return onDuty.reduce((s,sm)=>{const member=staffMembers.find(m=>m.id===sm.staffId);const rate=member&&member.dailySalary?Number(member.dailySalary):700;return s+rate;},0);};
  const gRev=d=>gA(d).filter(a=>a.status!=="cancelled").reduce((s,a)=>s+Number(a.cost||0),0);
  const gExpR=d=>gE(d).reduce((s,e)=>s+Number(e.amount||0),0);
  const gComm=d=>gA(d).filter(a=>a.groomerId&&a.status!=="cancelled").reduce((s,a)=>s+Number(a.cost||0)*0.1,0);
  const gExp=d=>gExpR(d)+gSal(d);
  const gP=d=>gRev(d)-gExp(d)-gComm(d);

  const allD=[...new Set([...Object.keys(schedules),...Object.keys(expenses),...Object.keys(staffByDate).filter(d=>(staffByDate[d]||[]).length>0)])];
  const totP=ds=>ds.reduce((s,d)=>s+gP(d),0);
  const thiswk=getWeek(0);
  const thismo=allD.filter(d=>d.startsWith(now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")));
  const thisyr=allD.filter(d=>d.startsWith(""+now.getFullYear()));
  const allAppts=Object.values(schedules).flat();
  const availYears=[...new Set([...allD.map(d=>parseInt(d.split("-")[0])),now.getFullYear()])].sort((a,b)=>b-a);

  const lastVisitData={};
  clients.forEach(cl=>{
    const hist=[];
    Object.entries(schedules).forEach(([date,appts])=>{appts.filter(a=>a.clientId===cl.id).forEach(a=>hist.push({...a,date}));});
    hist.sort((a,b)=>b.date.localeCompare(a.date));
    if(hist.length>0)lastVisitData[cl.id]=hist[0];
  });

  const getPay=key=>getPayE(paymentStatus[key]);
  const isPaid=key=>getPay(key).status==="paid";
  const togglePay=(key,amount)=>setPaymentStatus(p=>({...p,[key]:isPaid(key)?{status:"unpaid",paidAmount:0,paidOn:null}:{status:"paid",paidAmount:amount,paidOn:tod()}}));

  const togStaff=sm=>{
    const curr=gSt(selDate);const has=curr.find(s=>String(s.staffId)===String(sm.id));
    if(has)setStaffByDate(p=>({...p,[selDate]:curr.filter(s=>String(s.staffId)!==String(sm.id))}));
    else setStaffByDate(p=>({...p,[selDate]:[...curr,{staffId:sm.id,name:sm.name,designation:sm.designation}]}));
  };

  const cycleStatus=(date,apptId)=>{setSchedules(prev=>({...prev,[date]:(prev[date]||[]).map(a=>a.id===apptId?{...a,status:nextStatus(a.status||"pending")}:a)}));};
  const quickAssign=(date,apptId,groomerId)=>{setSchedules(prev=>({...prev,[date]:(prev[date]||[]).map(a=>a.id===apptId?{...a,groomerId:groomerId||null}:a)}));};

  const saveSm=()=>{
    if(!smForm.name.trim())return;
    const data={...smForm,dailySalary:Number(smForm.dailySalary)||700};
    if(smForm.id)setStaffMembers(p=>p.map(s=>s.id===smForm.id?data:s));
    else setStaffMembers(p=>[...p,{...data,id:Date.now()}]);
    setSmForm({id:null,name:"",age:"",designation:"Groomer",address:"",mobile:"",emergencyContact:"",dailySalary:700,photo:"",idPhoto:""});
    setShowSmForm(false);
  };

  const saveA=()=>{
    if(!aForm.clientId)return;
    const cl=clients.find(c=>c.id===Number(aForm.clientId));
    const newA=aForm.pets.filter(p=>p.petId&&p.service&&p.cost).map(p=>{
      const pt=cl&&cl.pets.find(pet=>pet.id===Number(p.petId));
      return{id:Date.now()+Math.random(),clientId:Number(aForm.clientId),petId:Number(p.petId),clientName:cl?cl.name:"",address:cl?cl.address:"",mobile:cl?cl.mobile:"",petName:pt?pt.name:"",breed:pt?pt.breed:"",petSize:pt?pt.size:"",furLength:p.furLength,service:p.service,cost:Number(p.cost),notes:p.notes,time:aForm.time,duration:aForm.duration||60,groomerId:aForm.groomerId?Number(aForm.groomerId)||aForm.groomerId:null,paymentMode:aForm.paymentMode||"",status:aForm.status||"pending"};
    });
    if(!newA.length)return;
    setSchedules(prev=>{const ex=actA?(prev[selDate]||[]).filter(a=>a.id!==actA.id):prev[selDate]||[];return{...prev,[selDate]:[...ex,...newA].sort((a,b)=>(a.time||"").localeCompare(b.time||""))};});
    setAForm(bA());setActA(null);setShowAForm(false);
  };

  const openEditAppt=a=>{setActA(a);setAForm({clientId:a.clientId,time:a.time||"",groomerId:a.groomerId||"",paymentMode:a.paymentMode||"",duration:a.duration||60,status:a.status||"pending",pets:[{petId:a.petId,furLength:a.furLength||"",service:a.service,cost:a.cost,notes:a.notes||""}]});setShowAForm(true);};
  const delA=(d,id)=>setSchedules(prev=>({...prev,[d]:(prev[d]||[]).filter(a=>a.id!==id)}));
  const saveCl=()=>{if(!cForm.name)return;const pets=cForm.pets.map(p=>({...p,id:p.id||Date.now()+Math.random()}));if(editCId)setClients(prev=>prev.map(c=>c.id===editCId?{...c,...cForm,pets}:c));else setClients(prev=>[...prev,{id:Date.now(),...cForm,pets}]);setCForm(bC());setEditCId(null);setShowCForm(false);};
  const updPet=(i,f,v)=>setCForm(prev=>({...prev,pets:prev.pets.map((p,j)=>i===j?{...p,[f]:v}:p)}));
  const saveE=()=>{if(!eForm.amt)return;const cat=eForm.cat==="Other"?eForm.custCat:eForm.cat;setExpenses(prev=>({...prev,[eForm.date]:[...(prev[eForm.date]||[]),{id:Date.now(),category:cat,amount:Number(eForm.amt)}]}));setEForm({date:tod(),cat:"",custCat:"",amt:""});setShowEForm(false);};
  const saveSv=()=>{if(!svForm.name.trim())return;if(editSvId)setServices(prev=>prev.map(sv=>sv.id===editSvId?{...sv,name:svForm.name,price:Number(svForm.price)}:sv));else setServices(prev=>[...prev,{id:Date.now(),name:svForm.name,price:Number(svForm.price)}]);setSvForm({name:"",price:""});setEditSvId(null);setShowSvForm(false);};

  const fCl=clients.filter(c=>c.name.toLowerCase().includes(nFilter.toLowerCase())||c.pets.some(p=>p.name.toLowerCase().includes(nFilter.toLowerCase())));
  const appts=gA(selDate);
  const dRev=gRev(selDate);const dExpR=gExpR(selDate);const dP=gP(selDate);const dSt=gSt(selDate);const dSal=gSal(selDate);const dComm=gComm(selDate);
  const syncDot=sync==="Synced"?"#34c759":sync==="Offline"?"#ff9f0a":"rgba(255,255,255,.4)";
  const goTab=k=>{setTab(k);setMenuOpen(false);};
  const prevDay=()=>{const d=new Date(selDate+"T12:00:00");d.setDate(d.getDate()-1);setSelDate(d.toISOString().split("T")[0]);};
  const nextDay=()=>{const d=new Date(selDate+"T12:00:00");d.setDate(d.getDate()+1);setSelDate(d.toISOString().split("T")[0]);};

  const trkDates=[...new Set([...Object.keys(schedules),...Object.keys(staffByDate)])].filter(d=>d>=trkStart&&d<=trkEnd&&gSt(d).length>0).sort().reverse();
  const periodKey=trkStart+"_"+trkEnd;
  const salKey=name=>"sal_"+name+"_"+periodKey;
  const comKey=sid=>"com_"+sid+"_"+periodKey;

  const salByStaff={};
  trkDates.forEach(d=>{
    gSt(d).forEach(s=>{
      if(!salByStaff[s.name])salByStaff[s.name]={name:s.name,designation:s.designation||"",days:0,total:0,dates:[]};
      const member=staffMembers.find(m=>m.id===s.staffId);
      const rate=member&&member.dailySalary?Number(member.dailySalary):700;
      salByStaff[s.name].days++;salByStaff[s.name].total+=rate;salByStaff[s.name].dates.push({date:d,amount:rate});
    });

  const commByGroomer={};

      const member=staffMembers.find(m=>m.id===a.groomerId);

      if(!commByGroomer[a.groomerId])commByGroomer[a.groomerId]={staffId:a.groomerId,name,total:0,pets:0,breakdown:[]};
      const comm=Number(a.cost||0)*0.1;

      commByGroomer[a.groomerId].breakdown.push({date:d,petName:a.petName,service:a.service,cost:Number(a.cost||0),comm});
    });
  });

  const salUnsettled=Object.values(salByStaff).filter(s=>!isPaid(salKey(s.name)));
  const salOutstandingTotal=salUnsettled.reduce((s,x)=>s+x.total,0);
  const commUnsettled=Object.values(commByGroomer).filter(g=>!isPaid(comKey(g.staffId)));
  const commOutstandingTotal=commUnsettled.reduce((s,x)=>s+x.total,0);
  const periodLabel=trkStart===trkEnd?fmtD(trkStart):fmtD(trkStart)+" - "+fmtD(trkEnd);

  const periodSel=(
    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>

      <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:12,color:A.g4}}>To</span><Inp type="date" value={trkEnd} onChange={e=>setTrkEnd(e.target.value)} style={{width:"auto",padding:"8px 10px",fontSize:16,minHeight:44}}/></div>
    </div>
  );

      <div style={{marginTop:6}}>

          {paid?"Paid":"Mark as Paid"}

        {paid&&entry.paidOn&&<p style={{fontSize:11,color:A.g4,textAlign:"center",marginTop:3}}>Paid {fmtD(entry.paidOn)}</p>}

    <ApptForm actA={actA} aForm={aForm} setAForm={setAForm} clients={clients} services={services} staffOnDuty={dSt} lastVisitData={lastVisitData} onSave={saveA} onClose={()=>{setShowAForm(false);setActA(null);setAForm(bA());}}/>
  );

  const renderContent=()=>{

    if(tab==="today"){
      const todAppts=gA(todStr);const todSt=gSt(todStr);

      const unpaid=todAppts.filter(a=>!a.paymentMode&&a.status!=="cancelled");
      const nextAppt=pending.filter(a=>a.time).sort((a,b)=>a.time.localeCompare(b.time))[0]||active[0]||null;
      const todRev=gRev(todStr);const todComm=gComm(todStr);const todP=gP(todStr);const todExp=gExp(todStr);const todCancelled=todAppts.filter(a=>a.status==="cancelled").length;

                    return(<tr key={d+s.name+i} style={{background:i%2===0?"#fff":"#fafafa",opacity:paid?.5:1}}><td className="td">{fmtD(d)}</td><td className="td" style={{fontWeight:600}}>{s.name}</td><td className="td"><Bdg color={dsgC(s.designation)}>{s.designation}</Bdg></td><td className="td" style={{color:paid?A.g3:A.ok,fontWeight:600,textDecoration:paid?"line-through":"none"}}>{fmt(rate)}</td></tr>);
                  }))}
                  <tr style={{background:"#1c1c1e"}}><td className="td" colSpan={3} style={{fontWeight:700,color:"#fff",borderBottom:"none"}}>OUTSTANDING - {periodLabel}</td><td className="td" style={{fontWeight:700,color:"#6ee7b7",borderBottom:"none"}}>{salUnsettled.length===0?"Fully Paid":fmt(salOutstandingTotal)}</td></tr>
                </tbody>
              </table>
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:8}}>
              <Shdr c="Commission Tracker" style={{marginBottom:0}}/>
              <p style={{fontSize:11,color:A.g4}}>10% per assigned dog</p>
            </div>
            {Object.keys(commByGroomer).length>0&&(
              <div className="gm" style={{marginBottom:10}}>
                {Object.values(commByGroomer).map(g=>{
                  const ck=comKey(g.staffId);const paid=isPaid(ck);
                  return(
                    <div key={g.staffId} className="sc">
                      <button onClick={()=>setCommDetailId(commDetailId===g.staffId?null:g.staffId)} style={{background:"none",border:"none",cursor:"pointer",width:"100%",fontFamily:"inherit",padding:0}}>
                        <p style={{fontWeight:700,fontSize:14,marginBottom:3,color:A.bu,textDecoration:"underline"}}>{g.name}</p>
                      </button>
                      <p style={{fontSize:11,color:A.g4,marginTop:7,marginBottom:2}}>{g.pets} dog{g.pets!==1?"s":""}</p>
                      {paid?<div><p style={{fontSize:13,color:A.g3,textDecoration:"line-through"}}>{fmt(g.total)}</p><p style={{fontSize:17,fontWeight:700,color:A.ok}}>Cleared</p></div>:<p style={{fontSize:17,fontWeight:700,color:A.wn,marginBottom:4}}>{fmt(g.total)}</p>}
                      <PayBtn pkey={ck} amount={g.total}/>
                    </div>
                  );
                })}
              </div>
            )}
            {commDetailId&&commByGroomer[commDetailId]&&(
              <div className="fbox" style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style={{fontSize:15,fontWeight:700}}>{commByGroomer[commDetailId].name} - Commission Breakdown</p>
                  <Btn sm v="sec" onClick={()=>setCommDetailId(null)}>Close</Btn>
                </div>
                <div className="twrap">
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr>{["Date","Pet","Service","Revenue","Commission"].map(h=><th key={h} className="th">{h}</th>)}</tr></thead>
                    <tbody>
                      {commByGroomer[commDetailId].breakdown.sort((a,b)=>b.date.localeCompare(a.date)).map((row,i)=>(
                        <tr key={i} style={{background:i%2===0?"#fff":"#fafafa"}}><td className="td">{fmtD(row.date)}</td><td className="td" style={{fontWeight:600}}>{row.petName}</td><td className="td" style={{fontSize:12}}>{row.service}</td><td className="td" style={{color:A.ok,fontWeight:600}}>{fmt(row.cost)}</td><td className="td" style={{color:A.wn,fontWeight:600}}>{fmt(row.comm)}</td></tr>
                      ))}
                      <tr style={{background:"#1c1c1e"}}><td className="td" colSpan={4} style={{fontWeight:700,color:"#fff",borderBottom:"none"}}>TOTAL COMMISSION</td><td className="td" style={{fontWeight:700,color:"#fcd34d",borderBottom:"none"}}>{fmt(commByGroomer[commDetailId].total)}</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            <div className="twrap" style={{marginBottom:20}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>{["Date","Groomer","Dogs","Commission"].map(h=><th key={h} className="th">{h}</th>)}</tr></thead>
                <tbody>
                  {trkDates.flatMap(d=>{
                    const dayComm={};
                    gA(d).filter(a=>a.groomerId&&a.status!=="cancelled").forEach(a=>{
                      if(!dayComm[a.groomerId])dayComm[a.groomerId]={name:(staffMembers.find(m=>m.id===a.groomerId)||{name:"Unknown"}).name,pets:0,comm:0};
                      dayComm[a.groomerId].pets++;dayComm[a.groomerId].comm+=Number(a.cost||0)*0.1;
                    });
                    return Object.entries(dayComm).map(([sid,dc],i)=>{
                      const paid=isPaid(comKey(sid));
                      return(<tr key={d+sid} style={{background:i%2===0?"#fff":"#fafafa",opacity:paid?.5:1}}><td className="td">{fmtD(d)}</td><td className="td" style={{fontWeight:600}}>{dc.name}</td><td className="td">{dc.pets}</td><td className="td" style={{color:paid?A.g3:A.wn,fontWeight:600,textDecoration:paid?"line-through":"none"}}>{fmt(dc.comm)}</td></tr>);
                    });
                  })}
                  <tr style={{background:"#1c1c1e"}}><td className="td" colSpan={3} style={{fontWeight:700,color:"#fff",borderBottom:"none"}}>OUTSTANDING - {periodLabel}</td><td className="td" style={{fontWeight:700,color:"#fcd34d",borderBottom:"none"}}>{commUnsettled.length===0?"Fully Paid":fmt(commOutstandingTotal)}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    if(tab==="dashboard"){
      const yrDates=allD.filter(d=>d.startsWith(""+annualYear));
      const yrRev=yrDates.reduce((s,d)=>s+gRev(d),0);
      const yrExp=yrDates.reduce((s,d)=>s+gExp(d),0);
      const yrComm=yrDates.reduce((s,d)=>s+gComm(d),0);
      const yrP=yrDates.reduce((s,d)=>s+gP(d),0);
      const monthlyData=Array.from({length:12},(_,mi)=>{
        const prefix=annualYear+"-"+String(mi+1).padStart(2,"0");
        const mDates=allD.filter(d=>d.startsWith(prefix));
        const revenue=mDates.reduce((s,d)=>s+gRev(d),0);
        const expenses=mDates.reduce((s,d)=>s+gExp(d),0);
        const comm=mDates.reduce((s,d)=>s+gComm(d),0);
        const profit=mDates.reduce((s,d)=>s+gP(d),0);
        const days=[...new Set(mDates)];
        const breakdown={};
        mDates.forEach(d=>{gE(d).forEach(e=>{breakdown[e.category]=(breakdown[e.category]||0)+e.amount;});});
        return{month:MS[mi],revenue,expenses,profit,comm,days,breakdown};
      });
      const lineData=monthlyData.map(m=>({label:m.month,value:m.revenue}));
      const profitLine=monthlyData.map(m=>({label:m.month,value:m.profit}));
      const svcCount={};
      allAppts.filter(a=>a.status!=="cancelled"&&a.service).forEach(a=>{const base=a.service.split(" - ")[0];svcCount[base]=(svcCount[base]||0)+1;});
      const svcPie=Object.entries(svcCount).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
      const pmCount={Cash:0,GCash:0};
      allAppts.filter(a=>a.status!=="cancelled").forEach(a=>{if(a.paymentMode==="Cash")pmCount.Cash++;else if(a.paymentMode==="GCash")pmCount.GCash++;});
      const pmPie=[{label:"Cash",value:pmCount.Cash},{label:"GCash",value:pmCount.GCash}].filter(x=>x.value>0);
      return(
        <div className="sec">
          <div className="phdr">
            <div><h1>Dashboard</h1><p>Business overview</p></div>
            <div className="phdr-r">{availYears.map(y=><button key={y} onClick={()=>setAnnualYear(y)} style={{padding:"7px 14px",borderRadius:A.pill,border:"none",background:annualYear===y?A.bl:A.g1,color:annualYear===y?"#fff":A.bl,fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",minHeight:"auto"}}>{y}</button>)}</div>
          </div>
          <div className="gm" style={{marginBottom:16}}>
            {[["This Week",fmt(totP(thiswk.filter(d=>allD.includes(d)))),totP(thiswk.filter(d=>allD.includes(d)))>=0?A.ok:A.er],["This Month",fmt(totP(thismo)),totP(thismo)>=0?A.ok:A.er],["This Year",fmt(yrP),yrP>=0?A.ok:A.er],["Total Clients",clients.length,A.bu],["Total Sessions",allAppts.filter(a=>a.status!=="cancelled").length,A.bl]].map(([l,val,c])=>(
              <div key={l} className="sc" style={{boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}><p style={{fontSize:10,color:A.g4,marginBottom:4,textTransform:"uppercase",fontWeight:600}}>{l}</p><p style={{fontSize:18,fontWeight:700,color:c}}>{val}</p></div>
            ))}
          </div>
          <div className="card" style={{padding:16,marginBottom:12}}>
            <p style={{fontSize:13,fontWeight:700,color:A.g4,textTransform:"uppercase",letterSpacing:.4,marginBottom:12}}>{annualYear} Summary</p>
            <div className="g4">
              {[["Revenue",fmt(yrRev),A.bu],["Expenses",fmt(yrExp),A.er],["Commission",fmt(yrComm),A.wn],["Net Profit",fmt(yrP),yrP>=0?A.ok:A.er]].map(([l,val,c])=>(
                <div key={l} style={{background:A.g1,borderRadius:10,padding:"10px",textAlign:"center"}}><p style={{fontSize:9,color:A.g4,marginBottom:3,textTransform:"uppercase",fontWeight:600}}>{l}</p><p style={{fontSize:13,fontWeight:700,color:c}}>{val}</p></div>
              ))}
            </div>
          </div>
          {/* Revenue by Groomer */}
          {(()=>{
            const groomerRev={};
            yrDates.forEach(d=>{
              gA(d).filter(a=>a.status!=="cancelled").forEach(a=>{
                const member=staffMembers.find(m=>m.id===a.groomerId);
                const name=a.groomerId?(member?member.name:"Unknown"):"Unassigned";
                if(!groomerRev[name])groomerRev[name]={revenue:0,sessions:0};
                groomerRev[name].revenue+=Number(a.cost||0);
                groomerRev[name].sessions++;
              });
            });
            const entries=Object.entries(groomerRev).sort((a,b)=>b[1].revenue-a[1].revenue);
            if(!entries.length)return null;
            const topRev=entries[0][1].revenue||1;
            return(
              <div className="card" style={{padding:16,marginBottom:12}}>
                <p style={{fontSize:13,fontWeight:700,color:A.g4,textTransform:"uppercase",letterSpacing:.4,marginBottom:14}}>{annualYear} Revenue by Groomer</p>
                {entries.map(([name,d])=>{
                  const pct=Math.round(d.revenue/topRev*100);
                  return(
                    <div key={name} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                        <span style={{fontSize:14,fontWeight:600,color:A.bl}}>{name}</span>
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <span style={{fontSize:11,color:A.g4}}>{d.sessions} session{d.sessions!==1?"s":""}</span>
                          <span style={{fontSize:14,fontWeight:700,color:A.ok}}>{fmt(d.revenue)}</span>
                        </div>
                      </div>
                      <div style={{background:A.g2,borderRadius:6,height:7,overflow:"hidden"}}>
                        <div style={{background:A.ok,height:7,borderRadius:6,width:pct+"%"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
          {/* Completed vs Cancelled Revenue */}
          {(()=>{
            const compRev=yrDates.reduce((s,d)=>s+gA(d).filter(a=>a.status==="completed").reduce((s2,a)=>s2+Number(a.cost||0),0),0);
            const cancRev=yrDates.reduce((s,d)=>s+gA(d).filter(a=>a.status==="cancelled").reduce((s2,a)=>s2+Number(a.cost||0),0),0);
            const compCnt=yrDates.reduce((s,d)=>s+gA(d).filter(a=>a.status==="completed").length,0);
            const cancCnt=yrDates.reduce((s,d)=>s+gA(d).filter(a=>a.status==="cancelled").length,0);
            const total=compRev+cancRev||1;
            if(!compCnt&&!cancCnt)return null;
            return(
              <div className="card" style={{padding:16,marginBottom:12}}>
                <p style={{fontSize:13,fontWeight:700,color:A.g4,textTransform:"uppercase",letterSpacing:.4,marginBottom:14}}>{annualYear} Completed vs Cancelled</p>
                <div className="g2" style={{marginBottom:14}}>
                  <div style={{background:A.sbg,borderRadius:12,padding:"14px"}}>
                    <p style={{fontSize:10,color:A.g4,textTransform:"uppercase",fontWeight:600,marginBottom:4}}>Completed</p>
                    <p style={{fontSize:20,fontWeight:700,color:A.ok,marginBottom:2}}>{fmt(compRev)}</p>
                    <p style={{fontSize:12,color:A.g4}}>{compCnt} appointment{compCnt!==1?"s":""}</p>
                  </div>
                  <div style={{background:A.dbg,borderRadius:12,padding:"14px"}}>
                    <p style={{fontSize:10,color:A.g4,textTransform:"uppercase",fontWeight:600,marginBottom:4}}>Cancelled</p>
                    <p style={{fontSize:20,fontWeight:700,color:A.er,marginBottom:2}}>{fmt(cancRev)}</p>
                    <p style={{fontSize:12,color:A.g4}}>{cancCnt} appointment{cancCnt!==1?"s":""}</p>
                  </div>
                </div>
                <div style={{background:A.g2,borderRadius:6,height:8,overflow:"hidden",display:"flex"}}>
                  <div style={{background:A.ok,height:8,width:Math.round(compRev/total*100)+"%",transition:"width .3s"}}/>
                  <div style={{background:A.er,height:8,flex:1,opacity:.5}}/>
                </div>
                <p style={{fontSize:11,color:A.g4,marginTop:6,textAlign:"center"}}>{Math.round(compRev/total*100)}% revenue retained</p>
              </div>
            );
          })()}
          <div className="card" style={{padding:16,marginBottom:12}}><LineChart data={lineData} color={A.bu} title={annualYear+" Monthly Revenue"}/></div>
          <div className="card" style={{padding:16,marginBottom:12}}><LineChart data={profitLine} color={A.ok} title={annualYear+" Monthly Profit"}/></div>
          <div className="g2" style={{marginBottom:12}}>
            <div className="card" style={{padding:16}}><PieChart data={svcPie} title="Services"/></div>
            <div className="card" style={{padding:16}}><PieChart data={pmPie} title="Payment"/></div>
          </div>
          <div className="card" style={{padding:"0 16px",marginBottom:12}}>
            <p style={{fontSize:13,fontWeight:700,color:A.g4,textTransform:"uppercase",letterSpacing:.4,padding:"14px 0 10px"}}>Monthly Breakdown</p>
            {monthlyData.filter(m=>m.revenue>0||m.expenses>0).reverse().map((m,i)=>(<MonthCard key={m.month} label={m.month+" "+annualYear} data={m} profit={m.profit} comm={m.comm}/>))}
            {monthlyData.every(m=>m.revenue===0&&m.expenses===0)&&<p style={{fontSize:14,color:A.g4,padding:"12px 0"}}>No data for {annualYear} yet.</p>}
          </div>
          <div className="fbox">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><p style={{fontSize:15,fontWeight:700}}>Expense Log</p><Btn sm onClick={()=>setShowEForm(true)}>+ Add</Btn></div>
            {showEForm&&(
              <div style={{marginBottom:14}}>
                <div className="g4" style={{marginBottom:10}}>
                  <div><Lbl c="Date"/><Inp type="date" value={eForm.date} onChange={e=>setEForm(p=>({...p,date:e.target.value}))}/></div>
                  <div><Lbl c="Category"/><Sel value={eForm.cat} onChange={e=>setEForm(p=>({...p,cat:e.target.value}))}><option value="">Select...</option>{EXP_CATS.map(c=><option key={c}>{c}</option>)}</Sel></div>
                  {eForm.cat==="Other"&&<div><Lbl c="Custom"/><Inp value={eForm.custCat} onChange={e=>setEForm(p=>({...p,custCat:e.target.value}))} placeholder="e.g. Parking"/></div>}
                  <div><Lbl c="Amount (P)"/><Inp type="number" value={eForm.amt} onChange={e=>setEForm(p=>({...p,amt:e.target.value}))} placeholder="0"/></div>
                </div>
                <div style={{display:"flex",gap:8}}><Btn sm onClick={saveE}>Save</Btn><Btn sm v="can" onClick={()=>setShowEForm(false)}>Cancel</Btn></div>
              </div>
            )}
            <ExpTable all={Object.entries(expenses).flatMap(([date,exps])=>exps.map(e=>({...e,date})))} expenses={expenses} setExpenses={setExpenses}/>
          </div>
        </div>
      );
    }

    if(tab==="permissions"){
      return(
        <div className="sec">
          <div className="phdr"><div><h1>Access</h1><p>Passwords & logins</p></div></div>
          <p style={{fontSize:13,color:A.g4,marginBottom:14}}>Manage who can access this app and what they can see.</p>
          <div className="card" style={{marginBottom:14}}>
            <div style={{padding:"12px 16px",borderBottom:".5px solid "+A.g2}}><p style={{fontWeight:700,fontSize:15}}>Owner Account</p><p style={{fontSize:12,color:A.g4,marginTop:2}}>Full access to all tabs and settings</p></div>
            <OwnPwEdit ownerPass={ownerPass} setOwnerPass={setOwnerPass}/>
          </div>
          <div className="card" style={{marginBottom:14}}>
            <div style={{padding:"12px 16px",borderBottom:".5px solid "+A.g2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><p style={{fontWeight:700,fontSize:15}}>Staff Accounts</p><p style={{fontSize:12,color:A.g4,marginTop:2}}>Today & Schedule tabs only</p></div>
              <Btn sm onClick={()=>setStaffAccounts(p=>[...p,{id:Date.now(),name:"",password:""}])}>+ Add</Btn>
            </div>
            {staffAccounts.length===0&&<div style={{padding:"20px 16px",textAlign:"center"}}><p style={{fontSize:14,color:A.g4}}>No staff accounts yet.</p></div>}
            {staffAccounts.map(s=>(<StfPwRow key={s.id} staff={s} onSave={updated=>setStaffAccounts(p=>p.map(x=>x.id===s.id?updated:x))} onDelete={()=>setStaffAccounts(p=>p.filter(x=>x.id!==s.id))}/>))}
          </div>
          <div style={{background:"#fff",borderRadius:13,padding:"14px 16px"}}>
            <p style={{fontSize:13,fontWeight:700,color:A.g4,textTransform:"uppercase",letterSpacing:.4,marginBottom:8}}>Security Note</p>
            <p style={{fontSize:13,color:A.g4,lineHeight:1.6}}>Passwords are stored locally. For better security, use unique passwords for each account. Staff can only view Today and Schedule tabs.</p>
          </div>
        </div>
      );
    }

    return null;
  };

  return(
    <div className="shell">
      <div className="sidebar">
        <div style={{flex:1,overflowY:"auto",paddingTop:8}}>
          {TABS.map(([k,label])=>(<button key={k} className={"snav"+(tab===k?" on":"")} onClick={()=>goTab(k)}>{label}</button>))}
        </div>
        <div className="sidebar-footer">
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}><div style={{width:6,height:6,borderRadius:"50%",background:syncDot,flexShrink:0}}/><span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>{sync}</span></div>
          <Btn v="sec" sm style={{width:"100%",fontSize:12,padding:"7px 10px",minHeight:34}} onClick={onLogout}>Sign Out</Btn>
        </div>
      </div>
      <div className="mob-hdr">
        <img src="https://i.imgur.com/UXTLxqT.png" alt="Ruff Cuts" style={{height:28,objectFit:"contain",marginRight:"auto",opacity:0,pointerEvents:"none"}}/>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:syncDot}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>{sync}</span>
          <button onClick={()=>setMenuOpen(true)} style={{width:36,height:36,borderRadius:9,background:"rgba(255,255,255,.1)",border:"none",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,cursor:"pointer",minHeight:"auto"}}>
            {[0,1,2].map(i=><div key={i} style={{width:18,height:2,background:"#fff",borderRadius:1}}/>)}
          </button>
        </div>
      </div>
      {menuOpen&&(
        <>
          <div className="dbk" onClick={()=>setMenuOpen(false)}/>
          <div className="drw">
            <div className="drw-top"><div style={{flex:1}}/><button onClick={()=>setMenuOpen(false)} style={{color:"rgba(255,255,255,.5)",fontSize:22,background:"none",border:"none",cursor:"pointer",minHeight:"auto",lineHeight:1}}>×</button></div>
            <div className="drw-nav">{TABS.map(([k,label])=>(<button key={k} className={"drw-item"+(tab===k?" on":"")} onClick={()=>goTab(k)}>{label}</button>))}</div>
            <div className="drw-foot"><Btn v="sec" style={{width:"100%"}} onClick={onLogout}>Sign Out</Btn></div>
          </div>
        </>
      )}
      <div className="main">{renderContent()}</div>
    </div>
  );
}

function App(){
  const[role,setRole]=useState(null);
  const[ownerPass,setOwnerPass]=useState(OWN_PASS);
  const[staffAccounts,setStaffAccounts]=useState([{id:1,name:"Staff",password:STF_PASS}]);
  if(!role)return <LoginScreen ownerPass={ownerPass} staffAccounts={staffAccounts} onLogin={setRole}/>;
  return(<ErrB><MainApp role={role} onLogout={()=>setRole(null)} ownerPass={ownerPass} setOwnerPass={setOwnerPass} staffAccounts={staffAccounts} setStaffAccounts={setStaffAccounts}/></ErrB>);
}

const container=document.getElementById("root");
const root=ReactDOM.createRoot(container);
root.render(<App/>);
document.getElementById("boot").style.display="none";
</script>
</body>
</html>
