<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;height:-webkit-fill-available;}
body{height:100%;height:-webkit-fill-available;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f2f2f7;color:#1c1c1e;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;overscroll-behavior:none;min-height:100vh;overflow-x:hidden;}
input,select,textarea,button{font-family:inherit;font-size:16px;outline:none;-webkit-appearance:none;appearance:none;border-radius:0;}
input,select,textarea{border-radius:10px;border:none;background:#f5f5f7;color:#1c1c1e;padding:12px 14px;width:100%;min-height:44px;}
input:focus,select:focus,textarea:focus{background:#e8e8ed;}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px;border:none;background:none;}
textarea{resize:vertical;min-height:80px;}
::placeholder{color:#aeaeb2;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}
.shell{display:block;min-height:100vh;min-height:-webkit-fill-available;width:100%;}
.sidebar{display:none;width:220px;background:#000;flex-direction:column;position:fixed;top:0;left:0;height:100%;z-index:100;overflow-y:auto;padding-top:env(safe-area-inset-top);}
.sidebar-logo{padding:20px;border-bottom:.5px solid rgba(255,255,255,.1);display:flex;justify-content:center;}
.sidebar-logo img{height:90px;width:auto;object-fit:contain;}
.snav{display:flex;align-items:center;padding:0 20px;height:48px;font-size:15px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-bottom:.5px solid rgba(255,255,255,.06);}
.snav.on{color:#fff;font-weight:600;background:rgba(255,255,255,.12);}
.sidebar-footer{padding:16px 20px;border-top:.5px solid rgba(255,255,255,.1);margin-top:auto;}
.main{flex:1;background:#f2f2f7;min-height:100vh;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:calc(54px + env(safe-area-inset-top));}
.mob-hdr{display:flex;align-items:center;background:rgba(0,0,0,.95);position:fixed;top:0;left:0;right:0;z-index:90;width:100%;padding-top:env(safe-area-inset-top);padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));padding-bottom:10px;min-height:calc(44px + env(safe-area-inset-top));}
.dbk{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;}
.drw{position:fixed;top:0;right:0;bottom:0;width:min(300px,75vw);background:#000;z-index:300;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.6);padding-top:env(safe-area-inset-top);}
.drw-top{padding:12px 16px;border-bottom:.5px solid rgba(255,255,255,.1);display:flex;align-items:center;min-height:52px;}
.drw-nav{flex:1;overflow-y:auto;padding:4px 0;}
.drw-item{display:block;width:100%;padding:0 20px;height:52px;font-size:17px;font-weight:500;color:rgba(255,255,255,.55);border:none;background:none;text-align:left;cursor:pointer;border-bottom:.5px solid rgba(255,255,255,.06);line-height:52px;}
.drw-item.on{font-weight:700;color:#fff;background:rgba(255,255,255,.1);}
.drw-foot{padding:20px;border-top:.5px solid rgba(255,255,255,.1);}
.sec{padding:16px;padding-bottom:max(24px,env(safe-area-inset-bottom));}
.card{background:#fff;border-radius:13px;overflow:hidden;margin-bottom:12px;}
.crow{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid rgba(0,0,0,.08);min-height:48px;}
.crow:last-child{border-bottom:none;}
.phdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.phdr h1{font-size:26px;font-weight:700;letter-spacing:-.02em;}
.phdr p{font-size:13px;color:#8e8e93;margin-top:3px;}
.phdr-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.fbox{background:#fff;border-radius:13px;padding:16px;margin-bottom:14px;}
.pbox{background:#f9f9f9;border-radius:10px;padding:14px;margin-bottom:10px;border:.5px solid rgba(0,0,0,.08);}
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:13px;background:#fff;}
.th{text-align:left;padding:9px 13px;border-bottom:.5px solid rgba(0,0,0,.1);font-size:11px;color:#8e8e93;font-weight:600;letter-spacing:.3px;text-transform:uppercase;background:#f9f9f9;white-space:nowrap;}
.td{padding:11px 13px;border-bottom:.5px solid rgba(0,0,0,.06);color:#1c1c1e;font-size:14px;vertical-align:top;}
.sc{background:#fff;border-radius:13px;padding:14px;text-align:center;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.gm{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gw{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.gf{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;}
.mdbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:flex-end;justify-content:center;}
.md{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:8px 20px max(24px,env(safe-area-inset-bottom));}
.mdh{width:36px;height:5px;background:#d1d1d6;border-radius:3px;margin:0 auto 14px;}
@media(min-width:640px){.mdbg{align-items:center;}.md{border-radius:16px;margin:20px;padding:20px;max-height:88vh;}}
.cal-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;background:#fff;}
.cal-col-hdr{position:sticky;top:0;z-index:20;display:flex;background:#fff;border-bottom:1px solid #e8e8ed;}
.cal-time-hdr{width:52px;flex-shrink:0;position:sticky;left:0;z-index:25;background:#fff;border-right:.5px solid #e8e8ed;display:flex;align-items:center;justify-content:center;}
.cal-staff-hdr{flex:1 0 120px;padding:7px 6px;text-align:center;border-right:.5px solid #e8e8ed;}
.cal-grid{display:flex;position:relative;}
.cal-time-col{width:52px;flex-shrink:0;position:sticky;left:0;z-index:10;background:#fafafa;border-right:.5px solid #e8e8ed;}
.cal-time-lbl{position:absolute;right:7px;font-size:10px;color:#aeaeb2;font-weight:600;transform:translateY(-50%);}
.cal-abs-col{flex:1 0 120px;position:relative;border-right:.5px solid #f0f0f0;cursor:pointer;}
.cal-abs-col:active{background:rgba(0,0,0,.02);}
.sp{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;font-family:inherit;}
.today-card{background:#fff;border-radius:12px;padding:13px 14px;margin-bottom:8px;border-left:4px solid #e8e8ed;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.today-card-primary{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;border:1.5px solid #e8e8ed;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.att-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
#boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;}
#boot img{height:90px;object-fit:contain;margin-bottom:16px;}
#boot p{font-size:14px;color:rgba(255,255,255,.35);}
@media(max-width:767px){
  .sidebar{display:none!important;}.mob-hdr{display:flex!important;}.main{margin-left:0!important;}
  .sec{padding:12px;padding-bottom:max(20px,env(safe-area-inset-bottom));}
  .phdr h1{font-size:22px;}.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr 1fr;}
  .g4{grid-template-columns:1fr 1fr;}.gm{grid-template-columns:1fr 1fr;}.gw{gap:3px;}.gf{grid-template-columns:1fr 1fr;}
}
@media(min-width:768px){
  .shell{flex-direction:row;}.sidebar{display:flex!important;}.mob-hdr{display:none!important;}.main{margin-left:220px;}
  .sec{padding:24px 28px;}.gm{grid-template-columns:repeat(3,1fr);}.g4{grid-template-columns:1fr 1fr;}
}
@media(min-width:1024px){.sec{padding:28px 36px;}.gm{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1400px){
  .sidebar{width:260px;}.sidebar-logo img{height:110px;}.main{margin-left:260px;}
  .sec{padding:40px 52px;}.gm{grid-template-columns:repeat(5,1fr);}
}

function polarToCart(cx,cy,r,deg){const rad=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}
function PieChart({data,title}){

      <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>

}

  const vals=data.map(d=>d.value);const max=Math.max(...vals,1);const min=Math.min(0,...vals);const range=max-min||1;
  const toX=i=>PX+(i/Math.max(data.length-1,1))*(W-PX-PY);
  const toY=v=>H-PY-((v-min)/range)*(H-PY*2);
  const pts=data.map((d,i)=>({x:toX(i),y:toY(d.value),...d}));
  const line=pts.map((p,i)=>(i===0?"M":"L")+p.x+" "+p.y).join(" ");
  const area=line+" L"+pts[pts.length-1].x+" "+toY(min)+" L"+pts[0].x+" "+toY(min)+"Z";
  const gid="g"+color.replace("#","");
  return(
    <div>
      {title&&<p style={{fontWeight:600,fontSize:14,marginBottom:14}}>{title}</p>}
      <div style={{overflowX:"auto"}}>
        <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{minWidth:240}}>
          <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".15"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
          {[0,.5,1].map((t,i)=>{const v=min+t*range;const y=toY(v);return(<g key={i}><line x1={PX} y1={y} x2={W-PY} y2={y} stroke={A.g2} strokeWidth={1}/><text x={PX-5} y={y+4} fontSize={9} textAnchor="end" fill={A.g3}>{fmt(v)}</text></g>);})}
          <path d={area} fill={"url(#"+gid+")"}/>
          <path d={line} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
          {pts.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r={4} fill={color} stroke="#fff" strokeWidth={2}/><text x={p.x} y={H-2} fontSize={9} textAnchor="middle" fill={A.g3}>{p.label}</text></g>))}
        </svg>
      </div>
    </div>
  );
}

    });

  const appts=gA(selDate);

  const commOutstandingTotal=commUnsettled.reduce((s,x)=>s+x.total,0);

              <button onClick={()=>{setActA(null);setAForm(bA());setShowAForm(true);}} style={{width:44,height:44,borderRadius:"50%",background:A.bu,border:"none",color:"#fff",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>

              <span style={{fontSize:11,color:"rgba(255,255,255,.4)",fontWeight:600,textTransform:"uppercase",letterSpacing:.4,flexShrink:0}}>On Duty</span>
              {todSt.map((s,i)=>{const dc=s.designation==="Groomer"?"#34c759":s.designation==="Driver"?"#0071e3":"#ff9f0a";return <span key={i} style={{fontSize:13,fontWeight:700,color:dc,background:dc+"22",padding:"4px 12px",borderRadius:20}}>{s.name}</span>;})}

            <div style={{background:"#1c1c1e",borderRadius:12,padding:"12px 14px",marginBottom:14}}>

                {[["Done",done.length,"#34c759"],["Active",active.length,"#ff9f0a"],["Pending",pending.length,"#aeaeb2"],["Unpaid",unpaid.length,"#ff375f"]].map(([l,n,c])=>(

              <div className="fbox" style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style={{fontSize:15,fontWeight:700}}>{commByGroomer[commDetailId].name} - Commission Breakdown</p>
                  <Btn sm v="sec" onClick={()=>setCommDetailId(null)}>Close</Btn>
                </div>
                <div className="twrap">
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr>{["Date","Pet","Service","Revenue","Commission"].map(h=><th key={h} className="th">{h}</th>)}</tr></thead>
                    <tbody>
                      {commByGroomer[commDetailId].breakdown.sort((a,b)=>b.date.localeCompare(a.date)).map((row,i)=>(
                        <tr key={i} style={{background:i%2===0?"#fff":"#fafafa"}}><td className="td">{fmtD(row.date)}</td><td className="td" style={{fontWeight:600}}>{row.petName}</td><td className="td" style={{fontSize:12}}>{row.service}</td><td className="td" style={{color:A.ok,fontWeight:600}}>{fmt(row.cost)}</td><td className="td" style={{color:A.wn,fontWeight:600}}>{fmt(row.comm)}</td></tr>
                      ))}
                      <tr style={{background:"#1c1c1e"}}><td className="td" colSpan={4} style={{fontWeight:700,color:"#fff",borderBottom:"none"}}>TOTAL COMMISSION</td><td className="td" style={{fontWeight:700,color:"#fcd34d",borderBottom:"none"}}>{fmt(commByGroomer[commDetailId].total)}</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            <div className="twrap" style={{marginBottom:20}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>{["Date","Groomer","Dogs","Commission"].map(h=><th key={h} className="th">{h}</th>)}</tr></thead>
                <tbody>
                  {trkDates.flatMap(d=>{
                    const dayComm={};
                    gA(d).filter(a=>a.groomerId&&a.status!=="cancelled").forEach(a=>{
                      if(!dayComm[a.groomerId])dayComm[a.groomerId]={name:(staffMembers.find(m=>m.id===a.groomerId)||{name:"Unknown"}).name,pets:0,comm:0};
                      dayComm[a.groomerId].pets++;dayComm[a.groomerId].comm+=Number(a.cost||0)*0.1;
                    });
                    return Object.entries(dayComm).map(([sid,dc],i)=>{
                      const paid=isPaid(comKey(sid));
                      return(<tr key={d+sid} style={{background:i%2===0?"#fff":"#fafafa",opacity:paid?.5:1}}><td className="td">{fmtD(d)}</td><td className="td" style={{fontWeight:600}}>{dc.name}</td><td className="td">{dc.pets}</td><td className="td" style={{color:paid?A.g3:A.wn,fontWeight:600,textDecoration:paid?"line-through":"none"}}>{fmt(dc.comm)}</td></tr>);
                    });
                  })}
                  <tr style={{background:"#1c1c1e"}}><td className="td" colSpan={3} style={{fontWeight:700,color:"#fff",borderBottom:"none"}}>OUTSTANDING - {periodLabel}</td><td className="td" style={{fontWeight:700,color:"#fcd34d",borderBottom:"none"}}>{commUnsettled.length===0?"Fully Paid":fmt(commOutstandingTotal)}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    if(tab==="dashboard"){
      const yrDates=allD.filter(d=>d.startsWith(""+annualYear));
      const yrRev=yrDates.reduce((s,d)=>s+gRev(d),0);
      const yrExp=yrDates.reduce((s,d)=>s+gExp(d),0);
      const yrComm=yrDates.reduce((s,d)=>s+gComm(d),0);
      const yrP=yrDates.reduce((s,d)=>s+gP(d),0);
      const monthlyData=Array.from({length:12},(_,mi)=>{
        const prefix=annualYear+"-"+String(mi+1).padStart(2,"0");
        const mDates=allD.filter(d=>d.startsWith(prefix));
        const revenue=mDates.reduce((s,d)=>s+gRev(d),0);
        const expenses=mDates.reduce((s,d)=>s+gExp(d),0);
        const comm=mDates.reduce((s,d)=>s+gComm(d),0);
        const profit=mDates.reduce((s,d)=>s+gP(d),0);
        const days=[...new Set(mDates)];
        const breakdown={};
        mDates.forEach(d=>{gE(d).forEach(e=>{breakdown[e.category]=(breakdown[e.category]||0)+e.amount;});});
        return{month:MS[mi],revenue,expenses,profit,comm,days,breakdown};
      });
      const lineData=monthlyData.map(m=>({label:m.month,value:m.revenue}));
      const profitLine=monthlyData.map(m=>({label:m.month,value:m.profit}));
      const svcCount={};
      allAppts.filter(a=>a.status!=="cancelled"&&a.service).forEach(a=>{const base=a.service.split(" - ")[0];svcCount[base]=(svcCount[base]||0)+1;});
      const svcPie=Object.entries(svcCount).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
      const pmCount={Cash:0,GCash:0};
      allAppts.filter(a=>a.status!=="cancelled").forEach(a=>{if(a.paymentMode==="Cash")pmCount.Cash++;else if(a.paymentMode==="GCash")pmCount.GCash++;});
      const pmPie=[{label:"Cash",value:pmCount.Cash},{label:"GCash",value:pmCount.GCash}].filter(x=>x.value>0);
      return(
        <div className="sec">
          <div className="phdr">
            <div><h1>Dashboard</h1><p>Business overview</p></div>
            <div className="phdr-r">{availYears.map(y=><button key={y} onClick={()=>setAnnualYear(y)} style={{padding:"7px 14px",borderRadius:A.pill,border:"none",background:annualYear===y?A.bl:A.g1,color:annualYear===y?"#fff":A.bl,fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",minHeight:"auto"}}>{y}</button>)}</div>
          </div>
          <div className="gm" style={{marginBottom:16}}>
            {[["This Week",fmt(totP(thiswk.filter(d=>allD.includes(d)))),totP(thiswk.filter(d=>allD.includes(d)))>=0?A.ok:A.er],["This Month",fmt(totP(thismo)),totP(thismo)>=0?A.ok:A.er],["This Year",fmt(yrP),yrP>=0?A.ok:A.er],["Total Clients",clients.length,A.bu],["Total Sessions",allAppts.filter(a=>a.status!=="cancelled").length,A.bl]].map(([l,val,c])=>(
              <div key={l} className="sc" style={{boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}><p style={{fontSize:10,color:A.g4,marginBottom:4,textTransform:"uppercase",fontWeight:600}}>{l}</p><p style={{fontSize:18,fontWeight:700,color:c}}>{val}</p></div>
            ))}
          </div>
          <div className="card" style={{padding:16,marginBottom:12}}>
            <p style={{fontSize:13,fontWeight:700,color:A.g4,textTransform:"uppercase",letterSpacing:.4,marginBottom:12}}>{annualYear} Summary</p>
            <div className="g4">
              {[["Revenue",fmt(yrRev),A.bu],["Expenses",fmt(yrExp),A.er],["Commission",fmt(yrComm),A.wn],["Net Profit",fmt(yrP),yrP>=0?A.ok:A.er]].map(([l,val,c])=>(
                <div key={l} style={{background:A.g1,borderRadius:10,padding:"10px",textAlign:"center"}}><p style={{fontSize:9,color:A.g4,marginBottom:3,textTransform:"uppercase",fontWeight:600}}>{l}</p><p style={{fontSize:13,fontWeight:700,color:c}}>{val}</p></div>
              ))}
            </div>
          </div>
          <div className="card" style={{padding:16,marginBottom:12}}><LineChart data={lineData} color={A.bu} title={annualYear+" Monthly Revenue"}/></div>
          <div className="card" style={{padding:16,marginBottom:12}}><LineChart data={profitLine} color={A.ok} title={annualYear+" Monthly Profit"}/></div>
          <div className="g2" style={{marginBottom:12}}>
            <div className="card" style={{padding:16}}><PieChart data={svcPie} title="Services"/></div>
            <div className="card" style={{padding:16}}><PieChart data={pmPie} title="Payment"/></div>
          </div>
          <div className="card" style={{padding:"0 16px",marginBottom:12}}>
            <p style={{fontSize:13,fontWeight:700,color:A.g4,textTransform:"uppercase",letterSpacing:.4,padding:"14px 0 10px"}}>Monthly Breakdown</p>
            {monthlyData.filter(m=>m.revenue>0||m.expenses>0).reverse().map((m,i)=>(<MonthCard key={m.month} label={m.month+" "+annualYear} data={m} profit={m.profit} comm={m.comm}/>))}
            {monthlyData.every(m=>m.revenue===0&&m.expenses===0)&&<p style={{fontSize:14,color:A.g4,padding:"12px 0"}}>No data for {annualYear} yet.</p>}
          </div>
          <div className="fbox">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><p style={{fontSize:15,fontWeight:700}}>Expense Log</p><Btn sm onClick={()=>setShowEForm(true)}>+ Add</Btn></div>
            {showEForm&&(
              <div style={{marginBottom:14}}>
                <div className="g4" style={{marginBottom:10}}>
                  <div><Lbl c="Date"/><Inp type="date" value={eForm.date} onChange={e=>setEForm(p=>({...p,date:e.target.value}))}/></div>
                  <div><Lbl c="Category"/><Sel value={eForm.cat} onChange={e=>setEForm(p=>({...p,cat:e.target.value}))}><option value="">Select...</option>{EXP_CATS.map(c=><option key={c}>{c}</option>)}</Sel></div>
                  {eForm.cat==="Other"&&<div><Lbl c="Custom"/><Inp value={eForm.custCat} onChange={e=>setEForm(p=>({...p,custCat:e.target.value}))} placeholder="e.g. Parking"/></div>}
                  <div><Lbl c="Amount (P)"/><Inp type="number" value={eForm.amt} onChange={e=>setEForm(p=>({...p,amt:e.target.value}))} placeholder="0"/></div>
                </div>
                <div style={{display:"flex",gap:8}}><Btn sm onClick={saveE}>Save</Btn><Btn sm v="can" onClick={()=>setShowEForm(false)}>Cancel</Btn></div>
              </div>
            )}
            <ExpTable all={Object.entries(expenses).flatMap(([date,exps])=>exps.map(e=>({...e,date})))} expenses={expenses} setExpenses={setExpenses}/>
          </div>
        </div>
      );
    }

    if(tab==="permissions"){
      return(
        <div className="sec">
          <div className="phdr"><div><h1>Access</h1><p>Passwords & logins</p></div></div>
          <p style={{fontSize:13,color:A.g4,marginBottom:14}}>Manage who can access this app and what they can see.</p>
          <div className="card" style={{marginBottom:14}}>
            <div style={{padding:"12px 16px",borderBottom:".5px solid "+A.g2}}><p style={{fontWeight:700,fontSize:15}}>Owner Account</p><p style={{fontSize:12,color:A.g4,marginTop:2}}>Full access to all tabs and settings</p></div>
            <OwnPwEdit ownerPass={ownerPass} setOwnerPass={setOwnerPass}/>
          </div>
          <div className="card" style={{marginBottom:14}}>
            <div style={{padding:"12px 16px",borderBottom:".5px solid "+A.g2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><p style={{fontWeight:700,fontSize:15}}>Staff Accounts</p><p style={{fontSize:12,color:A.g4,marginTop:2}}>Today & Schedule tabs only</p></div>
              <Btn sm onClick={()=>setStaffAccounts(p=>[...p,{id:Date.now(),name:"",password:""}])}>+ Add</Btn>
            </div>
            {staffAccounts.length===0&&<div style={{padding:"20px 16px",textAlign:"center"}}><p style={{fontSize:14,color:A.g4}}>No staff accounts yet.</p></div>}
            {staffAccounts.map(s=>(<StfPwRow key={s.id} staff={s} onSave={updated=>setStaffAccounts(p=>p.map(x=>x.id===s.id?updated:x))} onDelete={()=>setStaffAccounts(p=>p.filter(x=>x.id!==s.id))}/>))}
          </div>
          <div style={{background:"#fff",borderRadius:13,padding:"14px 16px"}}>
            <p style={{fontSize:13,fontWeight:700,color:A.g4,textTransform:"uppercase",letterSpacing:.4,marginBottom:8}}>Security Note</p>
            <p style={{fontSize:13,color:A.g4,lineHeight:1.6}}>Passwords are stored locally. For better security, use unique passwords for each account. Staff can only view Today and Schedule tabs.</p>
          </div>
        </div>
      );
    }

    return null;
  };

  return(
    <div className="shell">
      <div className="sidebar">
        <div className="sidebar-logo"><img src="https://i.imgur.com/UXTLxqT.png" alt="Ruff Cuts"/></div>
        <div style={{flex:1,overflowY:"auto"}}>
          {TABS.map(([k,label])=>(<button key={k} className={"snav"+(tab===k?" on":"")} onClick={()=>goTab(k)}>{label}</button>))}
        </div>
        <div className="sidebar-footer">
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}><div style={{width:7,height:7,borderRadius:"50%",background:syncDot,flexShrink:0}}/><span style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>{sync}</span></div>
          <Btn v="sec" sm style={{width:"100%"}} onClick={onLogout}>Sign Out</Btn>
        </div>
      </div>
      <div className="mob-hdr">
        <img src="https://i.imgur.com/UXTLxqT.png" alt="Ruff Cuts" style={{height:28,objectFit:"contain",marginRight:"auto"}}/>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:syncDot}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>{sync}</span>
          <button onClick={()=>setMenuOpen(true)} style={{width:36,height:36,borderRadius:9,background:"rgba(255,255,255,.1)",border:"none",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,cursor:"pointer",minHeight:"auto"}}>
            {[0,1,2].map(i=><div key={i} style={{width:18,height:2,background:"#fff",borderRadius:1}}/>)}
          </button>
        </div>
      </div>
      {menuOpen&&(
        <>
          <div className="dbk" onClick={()=>setMenuOpen(false)}/>
          <div className="drw">
            <div className="drw-top"><img src="https://i.imgur.com/UXTLxqT.png" alt="" style={{height:28,objectFit:"contain",marginRight:"auto"}}/><button onClick={()=>setMenuOpen(false)} style={{color:"rgba(255,255,255,.5)",fontSize:22,background:"none",border:"none",cursor:"pointer",minHeight:"auto",lineHeight:1}}>×</button></div>
            <div className="drw-nav">{TABS.map(([k,label])=>(<button key={k} className={"drw-item"+(tab===k?" on":"")} onClick={()=>goTab(k)}>{label}</button>))}</div>
            <div className="drw-foot"><Btn v="sec" style={{width:"100%"}} onClick={onLogout}>Sign Out</Btn></div>
          </div>
        </>
      )}
      <div className="main">{renderContent()}</div>
    </div>
  );
}

function App(){
  const[role,setRole]=useState(null);
  const[ownerPass,setOwnerPass]=useState(OWN_PASS);
  const[staffAccounts,setStaffAccounts]=useState([{id:1,name:"Staff",password:STF_PASS}]);
  if(!role)return <LoginScreen ownerPass={ownerPass} staffAccounts={staffAccounts} onLogin={setRole}/>;
  return(<ErrB><MainApp role={role} onLogout={()=>setRole(null)} ownerPass={ownerPass} setOwnerPass={setOwnerPass} staffAccounts={staffAccounts} setStaffAccounts={setStaffAccounts}/></ErrB>);
}

const container=document.getElementById("root");
const root=ReactDOM.createRoot(container);
root.render(<App/>);
document.getElementById("boot").style.display="none";
</script>


</body></html>
